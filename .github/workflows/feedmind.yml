name: FeedMind AI RSS Aggregator

on:
  schedule:
    # Run twice a day symmetrically every 12 hours.
    # 01:07 UTC (18:07 PDT / 17:07 PST) - Ready before 6:30 PM dinner!
    # 13:07 UTC (06:07 PDT / 05:07 PST) - Ready when waking up!
    - cron: '7 1,13 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  run-feedmind:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run FeedMind
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || vars.LLM_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || vars.GEMINI_MODEL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || vars.DEEPSEEK_MODEL }}
          OUTPUT_DIR: "output_feeds"
        run: python main.py

      - name: Commit Database Updates
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add -f rss_memory.db
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update RSS memory database" && git push)
          
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'output_feeds'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
